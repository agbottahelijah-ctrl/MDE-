<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Masel Digital Enterprises — POS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1a2e;--gold:#B8860B;--gold-light:#F5C842;--surface:#fff;--muted:#f7f6f0;--border:rgba(0,0,0,0.1);--text:#1a1a2e;--text-muted:#666;--bg:#f0ede8;--card:#fff;--input-bg:#f7f6f0;--success-bg:rgba(59,109,17,0.1);--info-bg:rgba(24,95,165,0.1)}
@media(prefers-color-scheme:dark){:root{--surface:#1e1e2e;--muted:#2a2a3e;--border:rgba(255,255,255,0.1);--text:#e8e6f0;--text-muted:#999;--bg:#13131f;--card:#1e1e2e;--input-bg:#2a2a3e;--success-bg:rgba(59,109,17,0.2);--info-bg:rgba(24,95,165,0.2)}}
body{font-family:Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{max-width:960px;margin:0 auto;padding:1rem}
.topbar{background:var(--ink);color:#fff;border-radius:12px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-size:1.3rem;font-weight:700;color:var(--gold-light)}
.logo span{font-size:0.7rem;font-weight:400;color:rgba(255,255,255,0.55);display:block;letter-spacing:2px;text-transform:uppercase}
.nav{display:flex;gap:6px;flex-wrap:wrap}
.nav button{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.2s;font-family:Georgia,serif}
.nav button.active,.nav button:hover{background:var(--gold-light);color:var(--ink);border-color:transparent;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:1rem;text-align:center}
.stat .val{font-size:1.4rem;font-weight:700}
.stat .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.stat.cash .val{color:#3B6D11}.stat.momo .val{color:#185FA5}.stat.total .val{color:#B8860B}
.panel{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;border-bottom:0.5px solid var(--border);padding-bottom:0.75rem;flex-wrap:wrap;gap:8px}
.panel-hd h3{font-size:15px;font-weight:500}
.btn{padding:7px 14px;border-radius:6px;border:0.5px solid var(--border);cursor:pointer;font-size:13px;background:var(--muted);color:var(--text);transition:all 0.15s;font-family:Georgia,serif}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--ink);color:#fff;border-color:transparent}
.btn-danger{color:#A32D2D;border-color:rgba(163,45,45,0.3);background:transparent}
.btn-danger:hover{background:rgba(163,45,45,0.07)}
.btn-sm{padding:4px 10px;font-size:12px}
.sale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.item-card{border:0.5px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s;background:var(--muted)}
.item-card:hover{border-color:var(--gold);background:var(--card);transform:translateY(-1px)}
.item-card .name{font-size:13px;font-weight:500;line-height:1.3}
.item-card .cat{font-size:11px;color:var(--text-muted);margin-top:2px}
.item-card .price{font-size:15px;font-weight:700;color:var(--ink);margin-top:6px}
@media(prefers-color-scheme:dark){.item-card .price{color:var(--gold-light)}}
.cart-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.cart-row:last-child{border:none}
.cart-row .desc{flex:1;font-size:13px}
.cart-row .qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;border:0.5px solid var(--border);border-radius:4px;background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:Georgia,serif}
.cart-row .subtotal{font-size:13px;font-weight:500;min-width:64px;text-align:right}
.pay-row{display:flex;gap:10px;margin-top:1rem}
.pay-btn{flex:1;padding:14px;border-radius:8px;border:2px solid var(--border);cursor:pointer;font-size:14px;font-weight:600;background:transparent;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text);font-family:Georgia,serif}
.pay-btn.cash-opt:hover,.pay-btn.cash-opt.selected{border-color:#3B6D11;background:var(--success-bg);color:#3B6D11}
.pay-btn.momo-opt:hover,.pay-btn.momo-opt.selected{border-color:#185FA5;background:var(--info-bg);color:#185FA5}
.total-bar{background:var(--ink);color:#fff;border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:1rem}
.total-bar .t-lbl{font-size:13px;opacity:0.7}
.total-bar .t-val{font-size:1.4rem;font-weight:700;color:var(--gold-light)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;background:var(--muted);color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
td{padding:8px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-cash{background:rgba(59,109,17,0.15);color:#3B6D11}
.badge-momo{background:rgba(24,95,165,0.15);color:#185FA5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:12px;padding:1.5rem;width:90%;max-width:420px}
.modal h3{font-size:16px;margin-bottom:1rem;font-weight:500}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:6px;font-size:14px;background:var(--input-bg);color:var(--text);font-family:Georgia,serif}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tab{display:none}.tab.active{display:block}
.search{padding:8px 12px;border:0.5px solid var(--border);border-radius:6px;font-size:13px;width:100%;max-width:300px;background:var(--input-bg);color:var(--text);margin-bottom:1rem;font-family:Georgia,serif}
.empty{text-align:center;padding:2rem;color:var(--text-muted);font-size:14px}
.flash{position:fixed;top:20px;right:20px;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:200;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.25);font-family:Georgia,serif}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.cat-btn{padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text-muted);transition:all 0.15s;font-family:Georgia,serif}
.cat-btn.active{background:var(--ink);color:#fff;border-color:transparent}
.confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;z-index:150}
.confirm-modal.open{display:flex}
.pos-layout{display:grid;grid-template-columns:1fr 340px;gap:1rem}
@media(max-width:700px){.pos-layout{grid-template-columns:1fr}}
select{background:var(--input-bg);color:var(--text);border:0.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px;font-family:Georgia,serif}
</style>
</head>
<body>
<div class="shell">
<div class="topbar">
  <div class="logo">Masel Digital Enterprises<span>Point of Sale &amp; Inventory</span></div>
  <div class="nav">
    <button class="active" onclick="showTab('pos',this)"><i class="ti ti-shopping-cart"></i> POS</button>
    <button onclick="showTab('sales',this)"><i class="ti ti-chart-bar"></i> Sales</button>
    <button onclick="showTab('inventory',this)"><i class="ti ti-package"></i> Items</button>
  </div>
</div>

<!-- POS TAB -->
<div id="tab-pos" class="tab active">
  <div class="stats">
    <div class="stat total"><div class="val" id="s-total">GH¢ 0.00</div><div class="lbl">Today's Revenue</div></div>
    <div class="stat cash"><div class="val" id="s-cash">GH¢ 0.00</div><div class="lbl">Cash</div></div>
    <div class="stat momo"><div class="val" id="s-momo">GH¢ 0.00</div><div class="lbl">MoMo</div></div>
    <div class="stat"><div class="val" id="s-txn">0</div><div class="lbl">Transactions</div></div>
  </div>
  <div class="pos-layout">
    <div>
      <div class="panel">
        <div class="panel-hd"><h3>Select Items</h3></div>
        <div class="cat-filter" id="cat-filter"></div>
        <div class="sale-grid" id="item-grid"></div>
      </div>
    </div>
    <div>
      <div class="panel">
        <div class="panel-hd">
          <h3><i class="ti ti-shopping-cart"></i> Cart</h3>
          <button class="btn btn-sm" onclick="clearCart()">Clear</button>
        </div>
        <div id="cart-items"><div class="empty">Tap items to add</div></div>
        <div style="margin-top:1rem">
          <div class="pay-row">
            <button class="pay-btn cash-opt" id="pay-cash" onclick="selectPayment('cash')"><i class="ti ti-cash"></i> Cash</button>
            <button class="pay-btn momo-opt" id="pay-momo" onclick="selectPayment('momo')"><i class="ti ti-device-mobile"></i> MoMo</button>
          </div>
          <div class="total-bar">
            <span class="t-lbl">Total</span>
            <span class="t-val" id="cart-total">GH¢ 0.00</span>
          </div>
          <button class="btn btn-primary" style="width:100%;margin-top:10px;padding:13px;font-size:15px" onclick="completeSale()">
            <i class="ti ti-check"></i> Complete Sale
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SALES TAB -->
<div id="tab-sales" class="tab">
  <div class="panel">
    <div class="panel-hd">
      <h3>Sales History</h3>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="filter-date" onchange="renderSales()">
          <option value="today">Today</option>
          <option value="week">This Week</option>
          <option value="all">All Time</option>
        </select>
        <button class="btn btn-sm btn-danger" onclick="confirmClearSales()"><i class="ti ti-trash"></i> Clear All</button>
      </div>
    </div>
    <div id="sales-table"></div>
  </div>
</div>

<!-- INVENTORY TAB -->
<div id="tab-inventory" class="tab">
  <div class="panel">
    <div class="panel-hd">
      <h3>Price List / Inventory</h3>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i class="ti ti-plus"></i> Add Item</button>
    </div>
    <input class="search" placeholder="Search items..." oninput="renderInventory(this.value)" />
    <div id="inv-table"></div>
  </div>
</div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h3 id="modal-title">Add New Item</h3>
    <div class="field"><label>Item Name</label><input id="f-name" placeholder="e.g. A4 Black &amp; White" /></div>
    <div class="field-row">
      <div class="field"><label>Category</label>
        <select id="f-cat">
          <option>Photocopy</option><option>Printing</option><option>Drinks</option><option>Services</option>
        </select>
      </div>
      <div class="field"><label>Price (GH¢)</label><input id="f-price" type="number" min="0" step="0.5" placeholder="0.00" /></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveItem()">Save</button>
      <button class="btn" style="flex:1" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-modal" id="confirm-modal">
  <div class="modal">
    <h3 id="confirm-title">Are you sure?</h3>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:1.5rem" id="confirm-msg"></p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger" style="flex:1;padding:10px" onclick="doConfirm()">Yes, Delete</button>
      <button class="btn" style="flex:1;padding:10px" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
const ITEMS_KEY='masel_items',SALES_KEY='masel_sales';
let cart={},payMethod='',editId=null,confirmCb=null,activeCat='All';

const defaultItems=[
  {id:1,name:'A4 Black & White',cat:'Photocopy',price:0.5},
  {id:2,name:'A4 Black & White, Front & Back',cat:'Photocopy',price:1},
  {id:3,name:'A4 Coloured (Stamp & Signature)',cat:'Photocopy',price:3},
  {id:4,name:'A4 Coloured (Picture)',cat:'Photocopy',price:5},
  {id:5,name:'A4 Coloured, Front & Back',cat:'Photocopy',price:7},
  {id:6,name:'A3 Black & White',cat:'Photocopy',price:2},
  {id:7,name:'A3 Black & White, Front & Back',cat:'Photocopy',price:4},
  {id:8,name:'A3 Coloured',cat:'Photocopy',price:7},
  {id:9,name:'A3 Coloured, Front & Back',cat:'Photocopy',price:10},
  {id:10,name:'A4 Black & White',cat:'Printing',price:1},
  {id:11,name:'A4 Black & White, Front & Back',cat:'Printing',price:2},
  {id:12,name:'A4 Coloured (Stamp & Signature)',cat:'Printing',price:3},
  {id:13,name:'A4 Coloured (Picture)',cat:'Printing',price:7},
  {id:14,name:'A4 Coloured, Front & Back',cat:'Printing',price:10},
  {id:15,name:'A3 Black & White',cat:'Printing',price:4},
  {id:16,name:'A3 Black & White, Front & Back',cat:'Printing',price:8},
  {id:17,name:'A3 Coloured',cat:'Printing',price:10},
  {id:18,name:'A3 Coloured, Front & Back',cat:'Printing',price:15},
  {id:19,name:'Guinness Malt (Can)',cat:'Drinks',price:14},
  {id:20,name:'Bel Aqua 750ml',cat:'Drinks',price:3},
  {id:21,name:'Bel Aqua 500ml',cat:'Drinks',price:2},
  {id:22,name:'Pure Water',cat:'Drinks',price:0.5},
  {id:23,name:'Typing & Printing Per Page',cat:'Services',price:10},
  {id:24,name:'Emailing a Scanned Document',cat:'Services',price:5},
  {id:25,name:'Scanning Only',cat:'Services',price:2},
  {id:26,name:'Brown Envelope (A4/A3)',cat:'Services',price:2.5},
  {id:27,name:'Binding (Indenture)',cat:'Services',price:7},
  {id:28,name:'Lamination',cat:'Services',price:5},
  {id:29,name:'Passport Picture (8 pieces)',cat:'Services',price:30},
  {id:30,name:'Internet Service / Emails',cat:'Services',price:5},
  {id:31,name:'Logo Creation',cat:'Services',price:100},
  {id:32,name:'Letterhead',cat:'Services',price:60},
  {id:33,name:'Indenture',cat:'Services',price:70},
  {id:34,name:'Editing (with Graphic Design)',cat:'Services',price:15},
  {id:35,name:'Online Application',cat:'Services',price:40},
];

let items=loadItems();
let sales=loadSales();

function loadItems(){try{const d=localStorage.getItem(ITEMS_KEY);return d?JSON.parse(d):defaultItems;}catch{return defaultItems;}}
function saveItems(){try{localStorage.setItem(ITEMS_KEY,JSON.stringify(items));}catch{}}
function loadSales(){try{const d=localStorage.getItem(SALES_KEY);return d?JSON.parse(d):[];}catch{return[];}}
function saveSales(){try{localStorage.setItem(SALES_KEY,JSON.stringify(sales));}catch{}}

function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
  if(t==='sales')renderSales();
  if(t==='inventory')renderInventory('');
}

const catColors={Photocopy:'#185FA5',Printing:'#854F0B',Drinks:'#3B6D11',Services:'#533AB7'};

function renderCatFilters(){
  const cats=['All',...new Set(items.map(i=>i.cat))];
  document.getElementById('cat-filter').innerHTML=cats.map(c=>
    `<button class="cat-btn${c===activeCat?' active':''}" onclick="filterCat('${c}')">${c}</button>`
  ).join('');
}

function filterCat(c){activeCat=c;renderCatFilters();renderItemGrid();}

function renderItemGrid(){
  const filtered=activeCat==='All'?items:items.filter(i=>i.cat===activeCat);
  const grid=document.getElementById('item-grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">No items found</div>';return;}
  grid.innerHTML=filtered.map(i=>`
    <div class="item-card" onclick="addToCart(${i.id})">
      <div class="name">${i.name}</div>
      <div class="cat" style="color:${catColors[i.cat]||'var(--text-muted)'}">${i.cat}</div>
      <div class="price">GH¢ ${fmt(i.price)}</div>
    </div>`).join('');
}

function fmt(n){return parseFloat(n).toFixed(2);}

function addToCart(id){cart[id]=(cart[id]||0)+1;renderCart();}

function renderCart(){
  const ids=Object.keys(cart);
  const el=document.getElementById('cart-items');
  if(!ids.length){el.innerHTML='<div class="empty">Tap items to add</div>';updateTotal();return;}
  el.innerHTML=ids.map(id=>{
    const item=items.find(i=>i.id==id);if(!item)return'';
    const q=cart[id];
    return`<div class="cart-row">
      <div class="desc">${item.name}<br><span style="font-size:11px;color:var(--text-muted)">${item.cat}</span></div>
      <div class="qty">
        <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
        <span style="font-size:13px;min-width:18px;text-align:center">${q}</span>
        <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
      </div>
      <div class="subtotal">GH¢ ${fmt(item.price*q)}</div>
      <button class="qty-btn" onclick="removeFromCart(${id})" style="color:#A32D2D;border-color:rgba(163,45,45,0.3)"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
  updateTotal();
}

function changeQty(id,d){cart[id]=(cart[id]||0)+d;if(cart[id]<=0)delete cart[id];renderCart();}
function removeFromCart(id){delete cart[id];renderCart();}
function clearCart(){cart={};payMethod='';document.getElementById('pay-cash').classList.remove('selected');document.getElementById('pay-momo').classList.remove('selected');renderCart();}

function updateTotal(){
  let t=0;Object.keys(cart).forEach(id=>{const item=items.find(i=>i.id==id);if(item)t+=item.price*cart[id];});
  document.getElementById('cart-total').textContent='GH¢ '+fmt(t);
}

function selectPayment(m){
  payMethod=m;
  document.getElementById('pay-cash').classList.toggle('selected',m==='cash');
  document.getElementById('pay-momo').classList.toggle('selected',m==='momo');
}

function completeSale(){
  if(!Object.keys(cart).length){flash('Add items to cart first','#854F0B');return;}
  if(!payMethod){flash('Please select Cash or MoMo','#854F0B');return;}
  let total=0;
  const lineItems=Object.keys(cart).map(id=>{
    const item=items.find(i=>i.id==id);
    total+=item.price*cart[id];
    return{name:item.name,cat:item.cat,qty:cart[id],price:item.price,subtotal:item.price*cart[id]};
  });
  const sale={id:Date.now(),date:new Date().toISOString(),items:lineItems,total,payMethod};
  sales.unshift(sale);saveSales();
  flash('Sale recorded! GH¢ '+fmt(total)+' via '+(payMethod==='cash'?'Cash':'MoMo'),'#3B6D11');
  clearCart();updateStats();
}

function updateStats(){
  const today=new Date().toDateString();
  const ts=sales.filter(s=>new Date(s.date).toDateString()===today);
  let total=0,cash=0,momo=0;
  ts.forEach(s=>{total+=s.total;if(s.payMethod==='cash')cash+=s.total;else momo+=s.total;});
  document.getElementById('s-total').textContent='GH¢ '+fmt(total);
  document.getElementById('s-cash').textContent='GH¢ '+fmt(cash);
  document.getElementById('s-momo').textContent='GH¢ '+fmt(momo);
  document.getElementById('s-txn').textContent=ts.length;
}

function renderSales(){
  const filter=document.getElementById('filter-date').value;
  const now=new Date();
  let filtered=sales;
  if(filter==='today'){const t=now.toDateString();filtered=sales.filter(s=>new Date(s.date).toDateString()===t);}
  else if(filter==='week'){const w=new Date(now-7*864e5);filtered=sales.filter(s=>new Date(s.date)>=w);}
  const el=document.getElementById('sales-table');
  if(!filtered.length){el.innerHTML='<div class="empty">No sales found for this period</div>';return;}
  el.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Date &amp; Time</th><th>Items</th><th>Payment</th><th>Total</th><th></th></tr></thead>
    <tbody>${filtered.map(s=>`
    <tr>
      <td>${new Date(s.date).toLocaleDateString('en-GH',{day:'numeric',month:'short',year:'numeric'})}<br>
          <span style="color:var(--text-muted);font-size:11px">${new Date(s.date).toLocaleTimeString('en-GH',{hour:'2-digit',minute:'2-digit'})}</span></td>
      <td>${s.items.map(i=>i.name+' x'+i.qty).join('<br>')}</td>
      <td><span class="badge badge-${s.payMethod}">${s.payMethod==='cash'?'Cash':'MoMo'}</span></td>
      <td style="font-weight:600">GH¢ ${fmt(s.total)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteSale(${s.id})"><i class="ti ti-trash"></i></button></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function deleteSale(id){
  openConfirm('Delete this sale?','This will permanently remove this transaction.',()=>{
    sales=sales.filter(s=>s.id!==id);saveSales();renderSales();updateStats();flash('Sale deleted');
  });
}

function confirmClearSales(){
  openConfirm('Clear all sales?','This will permanently delete ALL sales history.',()=>{
    sales=[];saveSales();renderSales();updateStats();flash('All sales cleared');
  });
}

function renderInventory(q){
  const list=q?items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())||i.cat.toLowerCase().includes(q.toLowerCase())):items;
  const el=document.getElementById('inv-table');
  if(!list.length){el.innerHTML='<div class="empty">No items found</div>';return;}
  el.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Item Name</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead>
    <tbody>${list.map(i=>`
    <tr>
      <td>${i.name}</td>
      <td><span class="badge" style="background:${catColors[i.cat]}22;color:${catColors[i.cat]}">${i.cat}</span></td>
      <td style="font-weight:600">GH¢ ${fmt(i.price)}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="openEditModal(${i.id})"><i class="ti ti-edit"></i> Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteItem(${i.id})"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function openAddModal(){editId=null;document.getElementById('modal-title').textContent='Add New Item';document.getElementById('f-name').value='';document.getElementById('f-price').value='';document.getElementById('add-modal').classList.add('open');}
function openEditModal(id){
  const item=items.find(i=>i.id===id);editId=id;
  document.getElementById('modal-title').textContent='Edit Item';
  document.getElementById('f-name').value=item.name;
  document.getElementById('f-cat').value=item.cat;
  document.getElementById('f-price').value=item.price;
  document.getElementById('add-modal').classList.add('open');
}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}

function saveItem(){
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value;
  const price=parseFloat(document.getElementById('f-price').value);
  if(!name||isNaN(price)||price<0){flash('Please fill all fields correctly','#854F0B');return;}
  if(editId){const idx=items.findIndex(i=>i.id===editId);items[idx]={...items[idx],name,cat,price};flash('Item updated!');}
  else{items.push({id:Date.now(),name,cat,price});flash('Item added!');}
  saveItems();closeModal();renderItemGrid();renderCatFilters();renderInventory('');
}

function deleteItem(id){
  openConfirm('Delete this item?','It will be removed from the price list and POS.',()=>{
    items=items.filter(i=>i.id!==id);saveItems();renderItemGrid();renderCatFilters();renderInventory('');flash('Item deleted');
  });
}

function openConfirm(title,msg,cb){
  confirmCb=cb;document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');confirmCb=null;}
function doConfirm(){if(confirmCb)confirmCb();closeConfirm();}

function flash(msg,color){
  const el=document.getElementById('flash');el.textContent=msg;el.style.background=color||'#3B6D11';el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

renderCatFilters();renderItemGrid();updateStats();
</script>
</body>
</html>
